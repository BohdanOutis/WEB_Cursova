<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оформлення замовлення - AutoParts</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <h1>AutoParts</h1>
                </div>
                <nav>
                    <ul>
                        <li><a href="/">Головна</a></li>
                        <li><a href="/catalog">Каталог</a></li>
                        <li><a href="/cart">Кошик</a></li>
                    </ul>
                </nav>
                <div class="header-actions">
                    <a href="/auth" class="btn-login">Вхід</a>
                    <a href="/cart" class="cart-icon">
                        🛒 <span class="cart-count">0</span>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <h2>Оформлення замовлення</h2>
            
            <div class="checkout-layout">
                <div class="checkout-form">
                    <form id="checkoutForm">
                        <h3>Контактна інформація</h3>
                        <div class="form-group">
                            <label>Ім'я</label>
                            <input type="text" name="name" required>
                        </div>
                        <div class="form-group">
                            <label>Прізвище</label>
                            <input type="text" name="surname" required>
                        </div>
                        <div class="form-group">
                            <label>Телефон</label>
                            <input type="tel" name="phone" required>
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" name="email" required>
                        </div>

                        <h3>Адреса доставки</h3>
                        <div class="form-group">
                            <label>Місто</label>
                            <input type="text" name="city" required>
                        </div>
                        <div class="form-group">
                            <label>Відділення Нової Пошти</label>
                            <input type="text" name="postOffice" required>
                        </div>

                        <h3>Спосіб оплати</h3>
                        <div class="form-group">
                            <label><input type="radio" name="payment" value="cash" checked> Готівкою при отриманні</label>
                            <label><input type="radio" name="payment" value="card"> Оплата карткою</label>
                        </div>

                        <button type="submit" class="btn-primary">Підтвердити замовлення</button>
                    </form>
                </div>

                <div class="order-summary">
                    <h3>Ваше замовлення</h3>
                    <div id="orderItems"></div>
                    <div class="summary-total">
                        <span>Всього:</span>
                        <span id="orderTotal">0 грн</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 AutoParts. Всі права захищені.</p>
        </div>
    </footer>

    <script src="js/checkout.js"></script>
</body>
</html>
