<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизація - AutoParts</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <h1>AutoParts</h1>
                </div>
                <nav>
                    <ul>
                        <li><a href="/">Головна</a></li>
                        <li><a href="/catalog">Каталог</a></li>
                        <li><a href="/cart">Кошик</a></li>
                    </ul>
                </nav>
                <div class="header-actions">
                    <a href="/auth" class="btn-login">Вхід</a>
                    <a href="/cart" class="cart-icon">
                        🛒 <span class="cart-count">0</span>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="auth-container">
                <div class="auth-tabs">
                    <button class="tab-btn active" onclick="showLogin()">Вхід</button>
                    <button class="tab-btn" onclick="showRegister()">Реєстрація</button>
                </div>

                <div id="loginForm" class="auth-form">
                    <h2>Вхід</h2>
                    <form onsubmit="handleLogin(event)">
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="loginEmail" required>
                        </div>
                        <div class="form-group">
                            <label>Пароль</label>
                            <input type="password" id="loginPassword" required>
                        </div>
                        <button type="submit" class="btn-primary">Увійти</button>
                    </form>
                </div>

                <div id="registerForm" class="auth-form" style="display: none;">
                    <h2>Реєстрація</h2>
                    <form onsubmit="handleRegister(event)">
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="registerEmail" required>
                        </div>
                        <div class="form-group">
                            <label>Пароль</label>
                            <input type="password" id="registerPassword" required>
                        </div>
                        <div class="form-group">
                            <label>Підтвердження паролю</label>
                            <input type="password" id="confirmPassword" required>
                        </div>
                        <button type="submit" class="btn-primary">Зареєструватися</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 AutoParts. Всі права захищені.</p>
        </div>
    </footer>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
