<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація - AutoParts</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <h1>AutoParts</h1>
                </div>
                <nav>
                    <ul>
                        <li><a href="/">Головна</a></li>
                        <li><a href="/catalog">Каталог</a></li>
                        <li><a href="/cart">Кошик</a></li>
                    </ul>
                </nav>
                <div class="header-actions">
                    <a href="/auth" class="btn-login">Вхід</a>
                    <a href="/cart" class="cart-icon">
                        🛒 <span class="cart-count">0</span>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- Toast Notification Container -->
    <div id="toastContainer" class="toast-container"></div>

    <main>
        <div class="container">
            <div class="auth-container">
                <div class="auth-header">
                    <h2>Реєстрація</h2>
                    <p>Створіть обліковий запис для зручних покупок</p>
                </div>

                <div class="auth-form">
                    <form id="registerForm" onsubmit="handleRegister(event)">
                        <div class="form-group">
                            <label>Ім'я</label>
                            <input type="text" id="registerName" required placeholder="Введіть ваше ім'я">
                        </div>
                        
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="registerEmail" required placeholder="example@email.com">
                        </div>
                        
                        <div class="form-group">
                            <label>Пароль</label>
                            <input type="password" id="registerPassword" required placeholder="Мінімум 6 символів">
                            <small class="form-hint">Пароль повинен містити мінімум 6 символів</small>
                        </div>
                        
                        <div class="form-group">
                            <label>Підтвердження паролю</label>
                            <input type="password" id="confirmPassword" required placeholder="Повторіть пароль">
                        </div>

                        <div class="form-group">
                            <label class="checkbox-label">
                                <input type="checkbox" id="agreeTerms" required>
                                Я погоджуюсь з <a href="#" class="link">умовами використання</a>
                            </label>
                        </div>
                        
                        <button type="submit" class="btn-primary btn-full">Зареєструватися</button>
                    </form>

                    <div class="auth-footer">
                        <p>Вже є акаунт? <a href="/auth" class="link">Увійти</a></p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 AutoParts. Всі права захищені.</p>
        </div>
    </footer>

    <script type="module" src="js/register.js"></script>
</body>
</html>
